      display: flex;

    .header-logo {

      color: var(--color-text-muted);
      pointer-events: none;

    #searchInput {

      border: none;
      border-bottom: 1px solid rgba(167, 139, 250, 0.2);
      font-size: 1rem;
      font-family: inherit;
      background: transparent;
      color: var(--color-text);
      outline: none;
      transition: background-color var(--transition);

      flex: 1;
      padding: 12px 8px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: .88rem;
      font-weight: 600;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      border-bottom: 3px solid transparent;
    }
    .tab-btn:hover { color: var(--color-primary); background: rgba(255,255,255,0.4); }
    .tab-btn.active {
      color: var(--color-primary-dark);
      border-bottom-color: var(--color-accent);
      background: rgba(255,255,255,0.6);
      font-weight: 700;
    }
    .tab-count {
      display: inline-block;
      background: rgba(167,139,250,0.15);
      color: var(--color-text-muted);
      border-radius: 20px;
      padding: 1px 7px;
      font-size: .72rem;
      margin-left: 4px;

    .tab-btn.active .tab-count {
      background: var(--color-accent-light);
      color: var(--color-primary-dark);

      padding: 8px 16px;

      font-size: .82rem;
      font-weight: 700;

      justify-content: center;
      box-shadow: 0 2px 8px rgba(100,80,200,0.18);

    .phone-link:hover { opacity: .92; transform: scale(1.01); box-shadow: 0 4px 14px rgba(100,80,200,0.28); }

      border-radius: 3px;

       ?뗮꽣
       ============================================================ */
    .app-footer {
      text-align: center;
      padding: 16px 20px 20px;
      color: var(--color-text-muted);
      font-size: .72rem;
      font-weight: 500;
      border-top: 1px solid rgba(167, 139, 250, 0.12);
      background: rgba(255,255,255,0.4);
      margin-top: auto;
    }
    .app-footer span {
      color: var(--color-primary);
      font-weight: 700;
    }

    /* ============================================================
       Toast ?뚮┝
       ============================================================ */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary));
      color: #fff;
      padding: 10px 22px;
      border-radius: 40px;
      font-size: .82rem;
      font-weight: 600;
      white-space: nowrap;
      box-shadow: var(--shadow-lg);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ============================================================
       濡쒕뵫 (?⑤씪??踰꾩쟾??
       ============================================================ */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(167,139,250,0.25);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============================================================
       諛섏쓳??
       ============================================================ */
    @media (min-width: 640px) {
      .header-title h1 { font-size: 1.15rem; }
      .tab-btn { font-size: .88rem; }
      .contact-card { padding: 16px 20px; }
      .results-container { padding: 24px 24px 32px; }
      .main-container { padding: 0 12px; margin: 12px auto 12px; }
    }

  </style>

    <nav class="tabs" role="tablist" aria-label="援щ텇 ??>
      <button class="tab-btn active" id="tab-all" role="tab" aria-selected="true" data-tab="all" onclick="switchTab('all')">
        ?꾩껜 <span class="tab-count" id="cnt-all">0</span>
      </button>
      <button class="tab-btn" id="tab-school" role="tab" aria-selected="false" data-tab="school" onclick="switchTab('school')">
        ?룶 ?숆탳 <span class="tab-count" id="cnt-school">0</span>
      </button>
      <button class="tab-btn" id="tab-office" role="tab" aria-selected="false" data-tab="office" onclick="switchTab('office')">
        ?룢截?援먯쑁泥?<span class="tab-count" id="cnt-office">0</span>
      </button>
    </nav>
    <div class="results-container">
      <div class="loading" id="loadingView">
        <div class="spinner"></div>
        <p style="color: var(--color-text-muted); font-size: 0.9rem;">?곗씠?곕? 遺덈윭?ㅻ뒗 以?..</p>
      </div>
      <div id="resultsArea" style="display:none;"></div>
    </div>
  </div>
</main>




<footer class="app-footer">
  <span>???몄쥌?밸퀎?먯튂?쒓탳?≪껌 ?숆탳?뺤콉怨?/span>
</footer>
<!-- Toast ?뚮┝ -->
<div id="toast" role="status" aria-live="polite"></div>

<script>
// ============================================================
// ?곹깭 蹂??
// ============================================================
let allContacts = [];          // ?꾩껜 ?먮낯 ?곗씠??
let currentTab = 'all';        // ?꾩옱 ?좏깮????
let searchQuery = '';          // ?꾩옱 寃?됱뼱
let isMobile = false;          // 紐⑤컮???щ? 媛먯?

// 紐⑤컮??媛먯?
function detectMobile() {
  isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
}

// ============================================================
// ?곗씠??濡쒕뱶 (fetch)
// ============================================================
async function loadContacts() {
  try {
    const response = await fetch('./contacts.json');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    allContacts = await response.json();
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('resultsArea').style.display = 'block';
    renderResults();
  } catch (err) {
    document.getElementById('loadingView').innerHTML = `
      <div class="status-msg">
        <div class="icon">?좑툘</div>
        <h3>?곗씠?곕? 遺덈윭?????놁뒿?덈떎</h3>
        <p>contacts.json ?뚯씪??媛숈? 寃쎈줈???덈뒗吏 ?뺤씤??二쇱꽭??</p>
        <p style="margin-top:8px;font-size:0.8rem;color:#999;">${err.message}</p>
      </div>`;
  }
}

// ============================================================
// 寃???꾪꽣留?
// ============================================================
function filterContacts(contacts, query, tab) {
  let filtered = contacts;

  // ???꾪꽣
  if (tab === 'school') {
    filtered = filtered.filter(c => c['遺꾨쪟'] === '?숆탳' || c['遺꾨쪟'] === '?숆탳?뺣낫');
  } else if (tab === 'office') {
    filtered = filtered.filter(c => c['遺꾨쪟'] === '援먯쑁泥?);
  }

  // 寃?됱뼱 ?꾪꽣
  if (query.trim()) {
    const q = query.trim().toLowerCase();
    filtered = filtered.filter(c =>
      (c['?깅챸'] || '').toLowerCase().includes(q) ||
      (c['?뚯냽'] || '').toLowerCase().includes(q) ||
      (c['?낅Т'] || '').toLowerCase().includes(q) ||
      (c['吏곸쐞'] || '').toLowerCase().includes(q) ||
      (c['?곕씫泥?] || '').includes(q)
    );
  }

  return filtered;
}

// ============================================================
// ?섏씠?쇱씠??泥섎━
// ============================================================
function hl(text, query) {
  if (!query || !text) return escHtml(text || '');
  const escaped = escHtml(text);
  const escapedQ = escHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(`(${escapedQ})`, 'gi'), '<mark class="highlight">$1</mark>');
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
// 移대뱶 ?뚮뜑留?
// ============================================================
function renderCard(c, query) {
  const isSchoolInfo = c['遺꾨쪟'] === '?숆탳?뺣낫';
  const isSchool  = c['遺꾨쪟'] === '?숆탳' || isSchoolInfo;
  const cls       = isSchool ? 'school' : 'office';
  const icon      = isSchool ? '?룶' : '?룢截?;
  const badgeTxt  = isSchool ? (isSchoolInfo ? '?숆탳??쒖젙蹂? : '?숆탳') : '援먯쑁泥?;
  const phone     = c['?곕씫泥?] || '';
  const name      = c['?깅챸']   || '';
  const pos       = c['吏곸쐞']   || '';
  const org       = c['?뚯냽']   || '';
  const task      = c['?낅Т']   || '';
  const est       = c['媛쒓탳??] || '';
  const clsNum    = c['?숆툒??] || '';
  const stdNum    = c['?숈깮??] || '';

  // ?꾪솕 留곹겕: 紐⑤컮?쇱? tel:, ?곗뒪?ы넲? 蹂듭궗 踰꾪듉
  let phoneHtml = '';
  if (phone) {
    const telNum = phone.replace(/[^0-9]/g, '');
    phoneHtml = `
      <div class="card-phone">
        <a href="tel:${telNum}" class="phone-link" id="phone-${telNum}"
           onclick="handlePhoneClick(event, '${escHtml(phone)}')">
          ?뱸 ${escHtml(phone)}
        </a>
      </div>`;
  }

  if (isSchoolInfo) {
    return `
      <article class="contact-card" style="border-left: 5px solid var(--color-school); background: #f8fafc; box-shadow: var(--shadow-md);" role="article">
        <div class="card-top">
          <div class="card-avatar school">${icon}</div>
          <div class="card-info">
            <div class="card-name" style="color: var(--color-primary-dark); font-size: 1.08rem;">
              ${hl(name, query)}
              <span class="badge school" style="background:#e0f2fe; color:#0369a1;">${badgeTxt}</span>
            </div>
            <div style="margin-top: 8px; font-size: 0.85rem; color: var(--color-text); display: grid; gap: 4px; border-top: 1px dashed var(--color-border); padding-top: 8px;">
              ${est ? `<div>?뱟 <strong>媛쒓탳??</strong> ${escHtml(est)}</div>` : ''}
              ${clsNum ? `<div>?뱤 <strong>?숆툒??</strong> ${escHtml(clsNum)}</div>` : ''}
              ${stdNum ? `<div>?뫁 <strong>?숈깮??</strong> ${escHtml(stdNum)}</div>` : ''}
            </div>
          </div>
        </div>
        ${phoneHtml}
      </article>`;
  }

  return `
    <article class="contact-card" role="article">
      <div class="card-top">
        <div class="card-avatar ${cls}">${icon}</div>
        <div class="card-info">
          <div class="card-name">
            ${hl(name, query)}
            <span class="badge ${cls}">${badgeTxt}</span>
          </div>
          ${pos ? `<div class="card-position">${hl(pos, query)}</div>` : ''}
          <div class="card-org">?뱧 ${hl(org, query)}</div>
          ${task ? `<div class="card-task">?뱦 ${hl(task, query)}</div>` : ''}
        </div>
      </div>
      ${phoneHtml}
    </article>`;
}

// ============================================================
// 寃곌낵 ?뚮뜑留?
// ============================================================
function renderResults() {
  const filtered = filterContacts(allContacts, searchQuery, currentTab);

  // ?숆탳?뺣낫 移대뱶媛 ??긽 ?곷떒???ㅻ룄濡??뺣젹
  filtered.sort((a, b) => {
    const isInfoA = a['遺꾨쪟'] === '?숆탳?뺣낫';
    const isInfoB = b['遺꾨쪟'] === '?숆탳?뺣낫';
    if (isInfoA && !isInfoB) return -1;
    if (!isInfoA && isInfoB) return 1;
    return 0;
  });

  const schoolFiltered = filterContacts(allContacts, searchQuery, 'school');
  const officeFiltered = filterContacts(allContacts, searchQuery, 'office');
  const allFiltered    = filterContacts(allContacts, searchQuery, 'all');

  // ??移댁슫???낅뜲?댄듃
  document.getElementById('cnt-all').textContent    = allFiltered.length;
  document.getElementById('cnt-school').textContent = schoolFiltered.length;
  document.getElementById('cnt-office').textContent = officeFiltered.length;

  const area = document.getElementById('resultsArea');

  if (!searchQuery.trim()) {
    // 寃?됱뼱 ?놁쓬 - ?덈궡 硫붿떆吏
    area.innerHTML = `
      <div class="status-msg">
        <div class="icon">?뵇</div>
        <h3>寃?됱뼱瑜??낅젰??二쇱꽭??/h3>
        <p>?대쫫, ?뚯냽 ?숆탳/遺?? ?대떦?낅Т濡?寃?됲븷 ???덉뒿?덈떎.</p>
        <p style="margin-top:8px;color:#94a3b8;font-size:0.8rem;">
          珥?${allContacts.length}媛??곕씫泥??깅줉??
        </p>
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    area.innerHTML = `
      <div class="status-msg">
        <div class="icon">?쁾</div>
        <h3>寃??寃곌낵媛 ?놁뒿?덈떎</h3>
        <p>"${escHtml(searchQuery)}"???대떦?섎뒗 ?곕씫泥섎? 李얠? 紐삵뻽?듬땲??</p>
      </div>`;
    return;
  }

  // ??뿉 ?곕씪 ?뱀뀡 遺꾨━ ?뚮뜑留?
  let html = `<div class="result-header">
    <span class="result-count">寃??寃곌낵 ${filtered.length}媛?/span>
  </div>`;

  if (currentTab === 'all') {
    // ?꾩껜 ?? 援먯쑁泥?/ ?숆탳 ?뱀뀡?쇰줈 遺꾨━
    const offices = filtered.filter(c => c['遺꾨쪟'] === '援먯쑁泥?);
    const schools = filtered.filter(c => c['遺꾨쪟'] === '?숆탳' || c['遺꾨쪟'] === '?숆탳?뺣낫');

    if (offices.length > 0) {
      html += `<div class="section-label">?룢截?援먯쑁泥?(${offices.length}紐?</div>`;
      offices.forEach(c => { html += renderCard(c, searchQuery); });
    }
    if (schools.length > 0) {
      // ?숆탳 ?뱀뀡 ?대??먯꽌??留덉뒪???뺣낫 ?뺣젹 蹂댁옣
      schools.sort((a, b) => {
        const isInfoA = a['遺꾨쪟'] === '?숆탳?뺣낫';
        const isInfoB = b['遺꾨쪟'] === '?숆탳?뺣낫';
        if (isInfoA && !isInfoB) return -1;
        if (!isInfoA && isInfoB) return 1;
        return 0;
      });
      html += `<div class="section-label">?룶 ?숆탳 ???諛?援먯쭅???뺣낫 (${schools.length}媛?</div>`;
      schools.forEach(c => { html += renderCard(c, searchQuery); });
    }
  } else {
    filtered.forEach(c => { html += renderCard(c, searchQuery); });
  }

  area.innerHTML = html;
}

// ============================================================
// ?꾪솕 ?대┃ ?몃뱾??(紐⑤컮?? tel ?덉슜, ?곗뒪?ы넲: 蹂듭궗)
// ============================================================
function handlePhoneClick(event, phone) {
  if (!isMobile) {
    event.preventDefault();
    copyPhone(phone);
  }
  // 紐⑤컮?쇱? 湲곕낯 tel: ?숈옉 ?덉슜
}

// ============================================================
// ?꾪솕踰덊샇 蹂듭궗
// ============================================================
function copyPhone(phone) {
  const clean = phone.replace(/[^0-9\-]/g, '');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(clean).then(() => showToast('?뱥 踰덊샇媛 蹂듭궗?섏뿀?듬땲?? ' + clean));
  } else {
    // ?대갚: textarea
    const ta = document.createElement('textarea');
    ta.value = clean;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('?뱥 踰덊샇媛 蹂듭궗?섏뿀?듬땲?? ' + clean);
  }
}

// ============================================================
// Toast ?뚮┝
// ============================================================
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ============================================================
// ???꾪솚
// ============================================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const active = btn.dataset.tab === tab;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-selected', active);
  });
  renderResults();
}

// ============================================================
// 寃???낅젰 ?대깽??
// ============================================================
const searchInput = document.getElementById('searchInput');
const clearBtn    = document.getElementById('clearBtn');
let searchTimer;

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  clearBtn.style.display = searchQuery ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderResults, 180); // ?붾컮?댁떛
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  clearBtn.style.display = 'none';
  searchInput.focus();
  renderResults();
});

// ============================================================
// 珥덇린??
// ============================================================
detectMobile();
loadContacts();
</script>
</body>
</html>
